<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3c3c3c"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Window shadow -->
  <rect x="10" y="10" width="780" height="480" rx="10" fill="#000" opacity="0.2"/>
  
  <!-- Terminal window -->
  <rect x="0" y="0" width="800" height="500" rx="10" fill="#1e1e1e" filter="url(#shadow)"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="40" rx="10" fill="url(#titleBar)"/>
  <rect x="0" y="20" width="800" height="20" fill="url(#titleBar)"/>
  
  <!-- Window buttons -->
  <circle cx="25" cy="20" r="8" fill="#ff5f56"/>
  <circle cx="45" cy="20" r="8" fill="#ffbd2e"/>
  <circle cx="65" cy="20" r="8" fill="#27c93f"/>
  
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" fill="#cccccc" font-family="system-ui" font-size="14">omni-cli</text>
  
  <!-- Content area -->
  <g transform="translate(20, 60)">
    <!-- Command 1 -->
    <text x="0" y="20" fill="#00ff00" font-family="Menlo, Monaco, monospace" font-size="14">$</text>
    <text x="20" y="20" fill="#ffffff" font-family="Menlo, Monaco, monospace" font-size="14">omni status</text>
    
    <!-- Output -->
    <text x="20" y="50" fill="#66d9ef" font-family="Menlo, Monaco, monospace" font-size="14">Branch:</text>
    <text x="100" y="50" fill="#f8f8f2" font-family="Menlo, Monaco, monospace" font-size="14">feature/omni-cli-federation-governance</text>
    
    <text x="20" y="75" fill="#66d9ef" font-family="Menlo, Monaco, monospace" font-size="14">Status:</text>
    <text x="100" y="75" fill="#a6e22e" font-family="Menlo, Monaco, monospace" font-size="14">✓ clean</text>
    
    <text x="20" y="100" fill="#66d9ef" font-family="Menlo, Monaco, monospace" font-size="14">Commits:</text>
    <text x="110" y="100" fill="#f8f8f2" font-family="Menlo, Monaco, monospace" font-size="14">5</text>
    
    <!-- Command 2 -->
    <text x="0" y="140" fill="#00ff00" font-family="Menlo, Monaco, monospace" font-size="14">$</text>
    <text x="20" y="140" fill="#ffffff" font-family="Menlo, Monaco, monospace" font-size="14">omni cred leaderboard</text>
    
    <!-- Leaderboard output -->
    <text x="20" y="170" fill="#66d9ef" font-family="Menlo, Monaco, monospace" font-size="14">Rank</text>
    <text x="80" y="170" fill="#66d9ef" font-family="Menlo, Monaco, monospace" font-size="14">Author</text>
    <text x="350" y="170" fill="#66d9ef" font-family="Menlo, Monaco, monospace" font-size="14">Credibility</text>
    
    <line x1="20" y1="180" x2="450" y2="180" stroke="#3c3c3c" stroke-width="1"/>
    
    <text x="20" y="205" fill="#fd971f" font-family="Menlo, Monaco, monospace" font-size="14">1.</text>
    <text x="50" y="205" fill="#f8f8f2" font-family="Menlo, Monaco, monospace" font-size="14">clay@omni.dev</text>
    <text x="350" y="205" fill="#a6e22e" font-family="Menlo, Monaco, monospace" font-size="14">15.5%</text>
    
    <text x="20" y="230" fill="#fd971f" font-family="Menlo, Monaco, monospace" font-size="14">2.</text>
    <text x="50" y="230" fill="#f8f8f2" font-family="Menlo, Monaco, monospace" font-size="14">alice@example.com</text>
    <text x="350" y="230" fill="#a6e22e" font-family="Menlo, Monaco, monospace" font-size="14">12.3%</text>
    
    <text x="20" y="255" fill="#fd971f" font-family="Menlo, Monaco, monospace" font-size="14">3.</text>
    <text x="50" y="255" fill="#f8f8f2" font-family="Menlo, Monaco, monospace" font-size="14">bob@example.com</text>
    <text x="350" y="255" fill="#a6e22e" font-family="Menlo, Monaco, monospace" font-size="14">8.7%</text>
    
    <!-- Cursor -->
    <rect x="20" y="300" width="8" height="18" fill="#00ff00">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
