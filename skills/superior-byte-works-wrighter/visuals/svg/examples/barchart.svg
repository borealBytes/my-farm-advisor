<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#6A1B9A"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#333" font-family="system-ui" font-size="18" font-weight="bold">
    Template Distribution by Category
  </text>
  
  <!-- Chart area -->
  <g transform="translate(60, 60)">
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#333" stroke-width="2"/>
    
    <!-- X-axis -->
    <line x1="0" y1="280" x2="500" y2="280" stroke="#333" stroke-width="2"/>
    
    <!-- Grid lines -->
    <line x1="0" y1="224" x2="500" y2="224" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="0" y1="168" x2="500" y2="168" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="0" y1="112" x2="500" y2="112" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="0" y1="56" x2="500" y2="56" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="0" y1="0" x2="500" y2="0" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Y-axis labels -->
    <text x="-10" y="0" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">600</text>
    <text x="-10" y="56" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">450</text>
    <text x="-10" y="112" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">300</text>
    <text x="-10" y="168" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">150</text>
    <text x="-10" y="224" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">50</text>
    <text x="-10" y="280" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">0</text>
    
    <!-- Bar 1: Education -->
    <rect x="30" y="30" width="60" height="250" fill="url(#bar1)" rx="4"/>
    <text x="60" y="295" text-anchor="middle" fill="#333" font-family="system-ui" font-size="11">Education</text>
    <text x="60" y="20" text-anchor="middle" fill="#4CAF50" font-family="system-ui" font-size="11" font-weight="bold">536</text>
    
    <!-- Bar 2: HOA -->
    <rect x="130" y="177" width="60" height="103" fill="url(#bar2)" rx="4"/>
    <text x="160" y="295" text-anchor="middle" fill="#333" font-family="system-ui" font-size="11">HOA</text>
    <text x="160" y="167" text-anchor="middle" fill="#2196F3" font-family="system-ui" font-size="11" font-weight="bold">119</text>
    
    <!-- Bar 3: Legal -->
    <rect x="230" y="196" width="60" height="84" fill="url(#bar3)" rx="4"/>
    <text x="260" y="295" text-anchor="middle" fill="#333" font-family="system-ui" font-size="11">Legal</text>
    <text x="260" y="186" text-anchor="middle" fill="#FF9800" font-family="system-ui" font-size="11" font-weight="bold">100</text>
    
    <!-- Bar 4: Business -->
    <rect x="330" y="240" width="60" height="40" fill="url(#bar4)" rx="4"/>
    <text x="360" y="295" text-anchor="middle" fill="#333" font-family="system-ui" font-size="11">Business</text>
    <text x="360" y="230" text-anchor="middle" fill="#9C27B0" font-family="system-ui" font-size="11" font-weight="bold">50</text>
    
    <!-- Bar 5: Other -->
    <rect x="430" y="264" width="60" height="16" fill="url(#bar5)" rx="4"/>
    <text x="460" y="295" text-anchor="middle" fill="#333" font-family="system-ui" font-size="11">Other</text>
    <text x="460" y="254" text-anchor="middle" fill="#F44336" font-family="system-ui" font-size="11" font-weight="bold">25</text>
  </g>
  
  <!-- Total -->
  <text x="500" y="380" text-anchor="end" fill="#666" font-family="system-ui" font-size="11">
    Total: 830 templates
  </text>
</svg>
