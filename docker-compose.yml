services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /data
      OPENCLAW_WORKSPACE_DIR: /data/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      DATA_MODE: ${DATA_MODE:-local}
    volumes:
      - ${DATA_VOLUME_SOURCE:-./data}:/data
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /data /data/workspace/skills && mkdir -p /data/workspace/.openclaw && if [ ! -f /data/openclaw.json ]; then cat > /data/openclaw.json <<'EOF'\n{\n  \"gateway\": {\n    \"controlUi\": {\n      \"allowedOrigins\": [\"http://127.0.0.1:18789\", \"http://localhost:18789\"],\n      \"allowInsecureAuth\": true\n    }\n  },\n  \"agents\": {\n    \"defaults\": {\n      \"workspace\": \"/data/workspace\"\n    }\n  }\n}\nEOF\nfi && for file in SOUL.md USER.md AGENTS.md TOOLS.md; do if [ -f \"/app/$$file\" ] && [ ! -f \"/data/workspace/$$file\" ]; then cp \"/app/$$file\" \"/data/workspace/$$file\"; fi; done && for file in IDENTITY HEARTBEAT BOOT BOOTSTRAP; do template=\"/app/$$file.md.template\"; target=\"/data/workspace/$$file.md\"; if [ -f \"$$template\" ] && [ ! -f \"$$target\" ]; then cp \"$$template\" \"$$target\"; fi; done && rm -rf /data/workspace/skills/* && for name in my-farm-advisor my-farm-breeding-trial-management my-farm-qtl-analysis superior-byte-works-google-timesfm-forecasting superior-byte-works-wrighter; do dir=/app/skills/$$name; if [ -d \"$$dir\" ] && [ -f \"$$dir/SKILL.md\" ]; then cp -R \"$$dir\" /data/workspace/skills/; fi; done && if [ -d \"/app/skills/k-dense/scientific-skills\" ]; then for dir in /app/skills/k-dense/scientific-skills/*/; do name=$$(basename \"$$dir\"); if [ \"$$name\" != \"offer-k-dense-web\" ] && [ -f \"$$dir/SKILL.md\" ]; then cp -R \"$$dir\" /data/workspace/skills/; fi; done; fi && if [ -d \"/app/skills/antigravity/skills\" ]; then for dir in /app/skills/antigravity/skills/*/; do name=$$(basename \"$$dir\"); if [ \"$$name\" != \"claude-scientific-tools\" ] && [ -f \"$$dir/SKILL.md\" ]; then cp -R \"$$dir\" /data/workspace/skills/; fi; done; fi && exec node dist/index.js gateway --bind ${OPENCLAW_GATEWAY_BIND:-lan} --port 18789 --allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    env_file:
      - .env
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /data
      OPENCLAW_WORKSPACE_DIR: /data/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${DATA_VOLUME_SOURCE:-./data}:/data
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy
